name: Issue Triage

on:
  issues:
    types:
      - opened
      - reopened

permissions:
  issues: write

jobs:
  add-triage-label:
    runs-on: ubuntu-latest
    steps:
      - name: Add triage label when type label is missing
        uses: actions/github-script@v7
        with:
          script: |
            const typeLabels = new Set(["epic", "feature", "bug", "chore"]);
            const labels = context.payload.issue.labels.map((label) => label.name);
            const hasTypeLabel = labels.some((label) => typeLabels.has(label));

            if (hasTypeLabel) {
              core.info("Issue already has a type label. Skipping triage label.");
              return;
            }

            if (labels.includes("triage")) {
              core.info("Issue already has the triage label. Skipping.");
              return;
            }

            await github.rest.issues.addLabels({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              labels: ["triage"],
            });
