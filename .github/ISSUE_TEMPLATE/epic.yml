name: Epic
description: Create a high-level initiative that groups related work.
title: "[Epic]: "
labels:
  - epic
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem or opportunity
      description: Describe the user need, business goal, or pain point behind this epic.
      placeholder: We need to...
    validations:
      required: true
  - type: textarea
    id: context
    attributes:
      label: Context
      description: Add relevant background, constraints, links, or dependencies.
      placeholder: This impacts...
    validations:
      required: true
  - type: textarea
    id: acceptance_criteria
    attributes:
      label: Acceptance criteria
      description: List the outcomes that must be true for this epic to be considered complete.
      placeholder: |
        - [ ] Outcome 1
        - [ ] Outcome 2
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: Area
      description: Select the main area affected by this work.
      options:
        - frontend
        - backend
        - mobile
        - infra
        - design
    validations:
      required: true
  - type: dropdown
    id: priority
    attributes:
      label: Priority
      description: Select the delivery priority.
      options:
        - P0
        - P1
        - P2
    validations:
      required: true
  - type: dropdown
    id: size
    attributes:
      label: Size
      description: Estimate the overall size of this initiative.
      options:
        - XS
        - S
        - M
        - L
    validations:
      required: true
